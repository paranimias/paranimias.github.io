<!-- This is almost entirely vibe coded -->
<div class="sidebar-module" style="margin-bottom: 30px;">
    <!-- Featured Tags title style for consistency -->
    <h5>Last.fm</h5>

    <div id="lastfm-widget" style="
        position: relative;
        background-color: #2a2a2a;
        border-radius: 4px;
        overflow: hidden;
        height: 172px;
        width: 172px;
        display: flex;
        align-items: flex-end;
        border: 1px solid #333;
        color: white;
        background-size: cover;
        background-position: center;
        transition: transform 0.3s ease;
    ">
        <div onclick="updateLastFm()" style="position: absolute; top: 8px; right: 8px; z-index: 10; cursor: pointer; opacity: 0.6;" title="Refresh">
            <i class="fa fa-refresh" id="refresh-icon"></i>
        </div>
        <a id="lastfm-link" href="#" target="_blank" style="
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 10%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
        ">
            <span
                style="font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 2px;"
                id="lastfm-status">Loading...</span>
            <span style="font-weight: 600; font-size: 1.05em; line-height: 1.2;
                display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
            " id="lastfm-track">Connecting to Last.fm</span>
            <span style="font-size: 0.8em; opacity: 0.9; margin-top: 2px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            " id="lastfm-artist"></span>
        </a>
    </div>
</div>

<script>
    const VERCEL_URL = "https://lastfm-proxy.vercel.app/api/now-playing";

    function updateLastFm() {
        const statusEl = document.getElementById("lastfm-status");
        const trackEl = document.getElementById("lastfm-track");
        const artistEl = document.getElementById("lastfm-artist");
        const widget = document.getElementById("lastfm-widget");

        statusEl.innerText = "UPDATING...";

        // Usamos Vercel para sacar la información
        fetch(VERCEL_URL)
            .then(response => response.json())
            .then(data => {
                const widget = document.getElementById("lastfm-widget");
                const track = data.recenttracks.track[0];
                const trackName = track.name;
                const artistName = track.artist["#text"];
                const albumArt = track.image.find(img => img.size === "extralarge")["#text"];

                trackEl.innerText = trackName;
                artistEl.innerText = artistName;
                if (albumArt) widget.style.backgroundImage = `url(${albumArt})`;
                
                if (track["@attr"] && track["@attr"].nowplaying === "true") {
                    statusEl.innerHTML = '<i class="fa fa-music" style="color: #1ed760;"></i> NOW PLAYING';
                } else {
                    statusEl.innerHTML = '<i class="fa fa-history"></i> RECENTLY PLAYED';
                }

                document.getElementById("lastfm-link").href = `https://www.last.fm/user/JoelJarcor`;

                // widget.addEventListener("mouseenter", () => widget.style.boxShadow = "4px 4px rgba(0,0,0,0.8)");
                // widget.addEventListener("mouseleave", () => widget.style.boxShadow = "4px 4px rgba(0,0,0,0.3)");

            })
            .catch(err => {
                statusEl.innerText = "OFFLINE";
                console.error(err);
            });
    }

    function timeAgo(uts) {
        const seconds = Math.floor((Date.now() / 1000) - uts);
        if (seconds < 60) return "JUST NOW";
        const intervals = {
            y: 31536000, mo: 2592000, d: 86400, h: 3600, m: 60
        };
        for (let key in intervals) {
            const interval = Math.floor(seconds / intervals[key]);
            if (interval >= 1) return `PLAYED ${interval}${key} AGO`;
        }
        return "RECENTLY PLAYED";
    }

    document.addEventListener("DOMContentLoaded", updateLastFm);
    
    // Actualizar cada 2 minutos
    setInterval(updateLastFm, 120000);
</script>
