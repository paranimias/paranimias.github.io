<!-- This is almost entirely vibe coded -->
<div class="sidebar-module" style="margin-bottom: 30px;">
    <!-- Featured Tags title style for consistency -->
    <h5>Last.fm</h5>

    <div id="lastfm-widget" style="
        position: relative;
        background-color: #2a2a2a;
        border-radius: 4px;
        overflow: hidden;
        height: 172px;
        width: 172px;
        display: flex;
        align-items: flex-end;
        box-shadow: 4px 4px rgba(0,0,0,0.3);
        border: 1px solid #333;
        color: white;
        background-size: cover;
        background-position: center;
        transition: transform 0.3s ease;
    ">
        <a id="lastfm-link" href="#" target="_blank" style="
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 10%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
        ">
            <span
                style="font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 2px;"
                id="lastfm-status">Loading...</span>
            <span style="font-weight: 600; font-size: 1.05em; line-height: 1.2;
                display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
            " id="lastfm-track">Connecting to Last.fm</span>
            <span style="font-size: 0.8em; opacity: 0.9; margin-top: 2px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            " id="lastfm-artist"></span>
        </a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const username = "JoelJarcor";
        const endpoint = `https://lastfm-last-played.biancarosa.com.br/${username}/latest-song`;

        fetch(endpoint)
            .then(response => response.json())
            .then(data => {
                if (data && data.track) {
                    const track = data.track;
                    const artistName = track.artist["#text"];
                    const trackName = track.name;
                    const albumArt = track.image.find(img => img.size === "extralarge")["#text"] || track.image[0]["#text"];
                    const trackUrl = track.url;

                    let statusHtml = "";
                    if (track["@attr"] && track["@attr"].nowplaying === "true") {
                        statusHtml = '<i class="fa fa-music" style="margin-right: 5px; color: #1ed760;"></i> NOW PLAYING';
                    } else if (track.date && track.date.uts) {
                        const seconds = Math.floor((Date.now() / 1000) - parseInt(track.date.uts));
                        let interval = seconds / 31536000;
                        let timeString = "";
                        if (interval >= 1) timeString = Math.floor(interval) + "y ago";
                        else if ((interval = seconds / 2592000) >= 1) timeString = Math.floor(interval) + "mo ago";
                        else if ((interval = seconds / 86400) >= 1) timeString = Math.floor(interval) + "d ago";
                        else if ((interval = seconds / 3600) >= 1) timeString = Math.floor(interval) + "h ago";
                        else if ((interval = seconds / 60) >= 1) timeString = Math.floor(interval) + "m ago";
                        else timeString = "just now";
                        
                        statusHtml = '<i class="fa fa-history" style="margin-right: 5px;"></i> PLAYED ' + timeString;
                    } else {
                        statusHtml = '<i class="fa fa-music" style="margin-right: 5px;"></i> LATEST TRACK';
                    }

                    document.getElementById("lastfm-track").innerText = trackName;
                    document.getElementById("lastfm-artist").innerText = artistName;
                    document.getElementById("lastfm-status").innerHTML = statusHtml;

                    if (albumArt) {
                        document.getElementById("lastfm-widget").style.backgroundImage = `url(${albumArt})`;
                    }

                    // Link to user profile instead of track URL
                    // document.getElementById("lastfm-link").href = `https://www.last.fm/user/${username}`;
                    document.getElementById("lastfm-link").href = `https://www.last.fm/user/JoelJarcor`;

                    // Simple hover effect
                    const widget = document.getElementById("lastfm-widget");
                    widget.addEventListener("mouseenter", () => widget.style.boxShadow = "4px 4px rgba(0,0,0,0.8)");
                    widget.addEventListener("mouseleave", () => widget.style.boxShadow = "4px 4px rgba(0,0,0,0.3)");
                }
            })
            .catch(error => {
                document.getElementById("lastfm-status").innerText = "OFFLINE";
                document.getElementById("lastfm-track").innerText = "Unable to load track";
                console.error("Error fetching Last.fm data:", error);
            });
    });
</script>
